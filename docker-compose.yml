version: '3.8'

services:
  apache1:
    image: httpd:2.4
    container_name: apache1
    volumes:
      - ./html:/usr/local/apache2/htdocs/:ro
    restart: unless-stopped

  apache2:
    image: httpd:2.4
    container_name: apache2
    volumes:
      - ./html:/usr/local/apache2/htdocs/:ro
    restart: unless-stopped

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apache1
      - apache2
    restart: unless-stopped
